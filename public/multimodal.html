<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多模态分析结论区 · 管理</title>
  <style>
    body { font-family:"Microsoft YaHei","PingFang SC",sans-serif; margin:0; background:#e8edf4; color:#0f172a; }
    header { background:linear-gradient(135deg,#04060a,#1a3d63); color:#f8fafc; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    header a { color:#fde68a; font-weight:700; text-decoration:none; }
    .wrap { max-width:1000px; margin:0 auto; padding:16px; }
    .card { background:#fff; border-radius:12px; padding:16px; margin-bottom:14px; border:1px solid rgba(15,35,71,.08); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { border:1px solid #e2e8f0; padding:8px; text-align:left; vertical-align:top; word-break:break-word; }
    th { background:#ebe6dc; }
    button.primary { cursor:pointer; border:none; border-radius:8px; padding:8px 14px; font-weight:800; background:linear-gradient(135deg,#e8c76b,#c9a44a); color:#0a1220; }
    pre { background:#f8fafc; padding:10px; border-radius:8px; font-size:12px; overflow:auto; max-height:220px; }
    .muted { color:#64748b; font-size:13px; }
    input { padding:8px; border-radius:8px; border:1px solid #cbd5e1; margin-right:8px; }
  </style>
</head>
<body>
  <header>
    <strong>多模态分析结论区（调用留痕）</strong>
    <div>
      <span id="who" class="muted" style="color:#e2e8f0"></span>
      <button type="button" class="primary" id="btnLogin">管理员登录</button>
      <a href="/index.html">返回主站（AI 工具）</a>
    </div>
  </header>
  <div class="wrap">
    <div class="card">
      <p class="muted" style="margin-top:0">展示 DeepSeek / Wavespeed 等服务端代理写入的 <code>ai_logs</code>。签约范围内可再接图纸比对、视频抽帧等结构化结论入库。</p>
      <div style="margin-bottom:10px">
        <input id="u" placeholder="用户名 admin" />
        <input id="p" type="password" placeholder="密码" />
        <button type="button" class="primary" id="btnGo">登录并刷新</button>
      </div>
      <pre id="err" hidden style="color:#b91c1c"></pre>
    </div>
    <div class="card">
      <h2 style="margin-top:0;font-size:16px">最近调用（最多 100 条）</h2>
      <table id="tbl"><thead><tr><th>时间</th><th>类型</th><th>提示摘要</th><th>结果摘要</th></tr></thead><tbody></tbody></table>
    </div>
  </div>
  <script>
    var T="aishigong_token";
    function tok(){ return localStorage.getItem(T)||""; }
    function h(){ return { Authorization:"Bearer "+tok() }; }
    function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

    function load(){
      fetch("/api/admin/ai-logs?limit=100",{headers:h()}).then(function(r){return r.json();}).then(function(j){
        if(j.error){ document.getElementById("err").hidden=false; document.getElementById("err").textContent=j.error; return; }
        document.getElementById("err").hidden=true;
        var tb=document.querySelector("#tbl tbody");
        tb.innerHTML=(j.data||[]).map(function(r){
          return "<tr><td>"+esc(r.created_at)+"</td><td>"+esc(r.kind)+"</td><td>"+esc((r.prompt||"").slice(0,120))+"</td><td>"+esc((r.result_summary||"").slice(0,160))+"</td></tr>";
        }).join("")||"<tr><td colspan=\"4\">暂无记录（可先在本站发起 AI 文生文/图）</td></tr>";
      });
    }

    function loginThen(){
      document.getElementById("err").hidden=false;
      document.getElementById("err").textContent="登录中…";
      fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("u").value.trim(),password:document.getElementById("p").value})})
        .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
        .then(function(x){
          if(!x.ok||!x.j.data){ document.getElementById("err").textContent=x.j.error||"失败"; return; }
          if(x.j.data.user.role!=="管理员"){ document.getElementById("err").textContent="需要管理员"; return; }
          localStorage.setItem(T,x.j.data.token);
          document.getElementById("who").textContent=x.j.data.user.name+"（管理员）";
          document.getElementById("err").hidden=true;
          load();
        });
    }
    document.getElementById("btnGo").onclick=loginThen;
    document.getElementById("btnLogin").onclick=function(){ document.getElementById("u").focus(); };

    if(tok()){
      fetch("/api/me",{headers:h()}).then(function(r){return r.json();}).then(function(j){
        if(j.data&&j.data.role==="管理员"){
          document.getElementById("who").textContent=j.data.name+"（管理员）";
          load();
        }
      });
    }
  </script>
</body>
</html>
