# =============================================================================
# AI 施工监控系统 — Nginx 反代 Node（仅 HTTP / 适合公网 IP 无域名）
#
# 前置：Node 监听 127.0.0.1:3780，.env 含 TRUST_PROXY=true、BIND_HOST=127.0.0.1
# 部署目录示例：/var/www/aishigong
#
# 服务器上安装位置：/etc/nginx/sites-available/aishigong
# 启用后访问：http://你的公网IP/
# =============================================================================

upstream aishigong_node {
    server 127.0.0.1:3780;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 8m;

    location / {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 文生图轮询较慢
    location /api/ai/ {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 心跳 / 占位
    location /api/stream/events {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
