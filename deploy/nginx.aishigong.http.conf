# =============================================================================
# AI 施工监控系统 — Nginx 反代 Node（HTTP / 公网 IP 无域名）
#
# 【首页】访问 http://服务器/ 时，由 Node（Express）按静态目录 index 返回
#       demo.html（见仓库 server/index.js 中 express.static 的 index 配置）。
#       本文件将全部请求反代到 Node，Nginx 侧不必再写 index / try_files。
#
# 前置：
#   - Node 监听 127.0.0.1:3780（或与 upstream 一致）
#   - 仓库根 .env：TRUST_PROXY=true、BIND_HOST=127.0.0.1（反代后必填 TRUST_PROXY）
#
# 服务器示例路径：/var/www/aishigong
# 安装：sudo cp 本文件 /etc/nginx/sites-available/aishigong
#      sudo ln -sf /etc/nginx/sites-available/aishigong /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream aishigong_node {
    server 127.0.0.1:3780;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 8m;

    location / {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 文生图轮询较慢
    location /api/ai/ {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 心跳 / 占位
    location /api/stream/events {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
