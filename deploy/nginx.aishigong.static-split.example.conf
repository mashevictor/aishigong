# =============================================================================
# 备选：Nginx 直接托管 public/ 静态资源，仅把 /api 等反代到 Node
#
# 使用场景：希望 HTML/JS/CSS 由 Nginx 直出，Node 只跑 API（需与现网发布方式一致）。
# 若你采用「整站反代」模式，请用 nginx.aishigong.http.conf / example.conf，不要用本文件。
#
# 【首页】须显式写 index demo.html，否则 Nginx 默认会找 index.html。
#
# 修改：root 改为服务器上 public 的绝对路径，如 /var/www/aishigong/public
# 前置：Node 仍监听 127.0.0.1:3780；HTML 与 Node 所连的 public 须为同一份发布物
# =============================================================================

upstream aishigong_node {
    server 127.0.0.1:3780;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 8m;

    root /var/www/aishigong/public;
    index demo.html index.html;

    # 仅 API 与流式等走 Node
    location /api/ {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ai/ {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/stream/events {
        proxy_pass http://aishigong_node;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
